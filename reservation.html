<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation Form</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="form-box">
    <h2>Reservation Form</h2>

    <div class="cart-summary">
      <h3>Your Order</h3>
      <div id="cart-items"></div>
      <p><strong>Total Quantity:</strong> <span id="total-quantity-text">0</span></p>
      <p><strong>Total Price:</strong> ₱<span id="total-price-text">0</span></p>
    </div>

    <form id="reservation-form"
      action="https://docs.google.com/forms/d/e/1FAIpQLSehVekEHJkjE8AmQXCyA8SgFd1ohybwMLyIJHW5XLn2lyBWzQ/formResponse"
      method="POST"
      target="_blank">

      <label for="name">Name:</label>
      <input type="text" id="name" name="entry.1474640450" required>

      <label for="contact">Contact Number:</label>
      <input type="text" id="contact" name="entry.525178952" required>

      <label for="message">Message: ("N/A" if none)</label>
      <textarea id="message" name="entry.767284745" required></textarea>

      <label for="pickup">When kwaon?</label>
      <input type="text" id="pickup" name="entry.876252423" required>

      <label for="order-list">Ordered Items:</label>
      <textarea id="order-list" name="entry.2051127903" readonly required></textarea>

      <label for="total-quantity">Total Quantity:</label>
      <input type="text" id="total-quantity" name="entry.955081378" readonly required>

      <label for="total-price">Total Price:</label>
<input type="text" id="total-price" name="entry.2094524185" readonly>

      <button type="submit">Submit Reservation</button>
    </form>

    <p id="success-message" style="display: none; margin-top: 15px;">
      Reservation submitted successfully.
    </p>

    <a href="index.html" class="back-link">Back to Store</a>
  </div>

  <script src="../javascript/script.js"></script>
</body>
</html>
